<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" fill="none">
  <!-- Hull shadow -->
  <ellipse cx="60" cy="148" rx="42" ry="8" fill="rgba(0,0,0,0.28)"/>
  <!-- Ark hull — wide wooden barge -->
  <path d="M12 138 Q60 156 108 138 L100 88 Q60 76 20 88 Z" fill="#7B4019"/>
  <path d="M12 138 Q60 156 108 138 L100 88 Q60 76 20 88 Z" fill="url(#hullShineL4)" opacity="0.3"/>
  <!-- Hull planks -->
  <line x1="14" y1="108" x2="106" y2="108" stroke="#5D2E0A" stroke-width="2" opacity="0.6"/>
  <line x1="12" y1="122" x2="108" y2="122" stroke="#5D2E0A" stroke-width="2" opacity="0.6"/>
  <!-- Deck planks -->
  <rect x="22" y="62" width="76" height="28" rx="4" fill="#A0522D"/>
  <line x1="22" y1="72" x2="98" y2="72" stroke="#7B3F10" stroke-width="1.5" opacity="0.7"/>
  <line x1="22" y1="80" x2="98" y2="80" stroke="#7B3F10" stroke-width="1.5" opacity="0.7"/>
  <!-- Ark cabin structure -->
  <rect x="30" y="32" width="60" height="32" rx="4" fill="#8B4513"/>
  <rect x="36" y="38" width="48" height="20" rx="3" fill="#6B2F05"/>
  <!-- Windows -->
  <rect x="40" y="42" width="10" height="8" rx="2" fill="#B8860B" opacity="0.7"/>
  <rect x="55" y="42" width="10" height="8" rx="2" fill="#B8860B" opacity="0.7"/>
  <rect x="70" y="42" width="10" height="8" rx="2" fill="#B8860B" opacity="0.7"/>
  <!-- Roof -->
  <polygon points="26,32 60,12 94,32" fill="#7B2D00"/>
  <!-- Dove on top -->
  <circle cx="60" cy="10" r="4" fill="white" opacity="0.9"/>
  <path d="M60 10 Q68 6 72 10" stroke="white" stroke-width="1.5" fill="none" opacity="0.9"/>
  <!-- Olive branch hint -->
  <path d="M60 10 Q56 14 52 12" stroke="#4CAF50" stroke-width="1.5" fill="none"/>
  <defs>
    <linearGradient id="hullShineL4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
