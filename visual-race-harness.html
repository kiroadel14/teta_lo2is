<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Race Visual Harness</title>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import React from 'react';
      import { createRoot } from 'react-dom/client';
      import '/src/styles/index.css';
      import { RaceScreen } from '/src/app/components/RaceScreen.tsx';
      import { LEVELS } from '/src/app/data/levels.ts';

      const level = LEVELS.find((item) => item.id === 'level_1') ?? LEVELS[0];

      createRoot(document.getElementById('root')).render(
        React.createElement(RaceScreen, {
          level,
          onBack: () => {},
          onGameOver: () => {},
        }),
      );
    </script>
  </body>
</html>
