<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" fill="none">
  <!-- Hull shadow -->
  <ellipse cx="60" cy="148" rx="42" ry="8" fill="rgba(0,0,0,0.28)"/>
  <!-- Main hull -->
  <path d="M18 130 Q60 150 102 130 L96 90 Q60 80 24 90 Z" fill="#1565C0"/>
  <path d="M18 130 Q60 150 102 130 L96 90 Q60 80 24 90 Z" fill="url(#hullShineL1)" opacity="0.5"/>
  <!-- Hull stripe -->
  <path d="M22 120 Q60 138 98 120 L96 110 Q60 124 24 110 Z" fill="#0D47A1" opacity="0.7"/>
  <!-- Deck -->
  <rect x="30" y="60" width="60" height="32" rx="6" fill="#42A5F5"/>
  <rect x="30" y="60" width="60" height="32" rx="6" fill="url(#deckShineL1)" opacity="0.4"/>
  <!-- Cabin / windshield -->
  <rect x="38" y="36" width="44" height="28" rx="5" fill="#1976D2"/>
  <rect x="42" y="40" width="36" height="18" rx="3" fill="#90CAF9" opacity="0.6"/>
  <!-- Cabin top -->
  <rect x="44" y="28" width="32" height="10" rx="4" fill="#1565C0"/>
  <!-- Bow -->
  <polygon points="60,8 40,36 80,36" fill="#1565C0"/>
  <!-- Bow stripe -->
  <line x1="60" y1="10" x2="60" y2="36" stroke="#90CAF9" stroke-width="2" opacity="0.5"/>
  <!-- Flag -->
  <line x1="60" y1="8" x2="60" y2="0" stroke="#FFCC02" stroke-width="2"/>
  <polygon points="60,0 72,4 60,8" fill="#FFCC02"/>
  <defs>
    <linearGradient id="hullShineL1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="deckShineL1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
